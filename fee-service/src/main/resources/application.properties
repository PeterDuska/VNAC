minimal.fee.limit=${minimal_fee_limit:10000}
%dev.minimal.fee.limit=10000
%test.minimal.fee.limit=10000
%prod.minimal.fee.limit=10000

quarkus.datasource.db-kind=h2
#jdbc:h2:mem:test
%dev.quarkus.datasource.jdbc.url=${db_url}
%test.quarkus.datasource.jdbc.url=${db_url}
%prod.quarkus.datasource.jdbc.url=${db_url}

quarkus.datasource.username=${db_username}


#drop-and-create
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create


quarkus.swagger-ui.always-include=true


quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.admin-user=admin-password
quarkus.security.users.embedded.roles.admin-user=user,admin

quarkus.container-image.group=fmfi
quarkus.container-image.name=fee-service
quarkus.container-image.tag=latest
quarkus.container-image.push=false

quarkus.kubernetes.env.configmaps=app-configmap
quarkus.kubernetes.image-pull-policy=never
quarkus.kubernetes.service-type=load-balancer
quarkus.kubernetes.ports."http".host-port=8084


quarkus.kubernetes.namespace=default
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.api-server-url=https://kubernetes.docker.internal:6443/
quarkus.kubernetes-client.client-cert-data=${CLIENT_CERT_DATA:}
quarkus.kubernetes-client.client-key-data=${CLIENT_CERT_KEY:}
